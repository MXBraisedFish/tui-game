[package]
name = "tui-game"
version = "0.10.18"
edition = "2024"

[lib]
name = "tui_game"
path = "src/lib.rs"

[[bin]]
name = "tui-game"
path = "src/main.rs"

[dependencies]
crossterm = "0.29.0"
ratatui = "0.30.0"
mlua = { version = "0.11.6", features = ["lua54", "vendored"] }
anyhow = "1.0.102"
unicode-width = "0.2.2"
once_cell = "1.19"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
