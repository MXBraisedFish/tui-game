[package]
name = "tui-game"
version = "0.10.16"
edition = "2024"

[lib]
name = "tui_game"
path = "src/lib.rs"

[[bin]]
name = "tui-game"
path = "src/main.rs"

[[bin]]
name = "version"
path = "src/bin/version.rs"

[[bin]]
name = "updata"
path = "src/bin/updata.rs"

[[bin]]
name = "remove"
path = "src/bin/remove.rs"

[dependencies]
crossterm = "0.29.0"
ratatui = "0.30.0"
mlua = { version = "0.11.6", features = ["lua54", "vendored"] }
anyhow = "1.0.102"
unicode-width = "0.2.2"
once_cell = "1.19"
semver = "1.0"
reqwest = { version = "0.13.2", features = ["json", "blocking"] }
directories = "6.0.0"
opener = "0.8.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
