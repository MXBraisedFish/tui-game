name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: tui-game-linux.tar.gz
            main_bin: tui-game
            version_bin: version
            updata_bin: updata
            remove_bin: remove
            tg_script: Linux/tg.sh
            tg_output: tg.sh
          - os: windows-latest
            asset_name: tui-game-windows.zip
            main_bin: tui-game.exe
            version_bin: version.exe
            updata_bin: updata.exe
            remove_bin: remove.exe
            tg_script: Windows/tg.bat
            tg_output: tg.bat
          - os: macos-latest
            asset_name: tui-game-macos.zip
            main_bin: tui-game
            version_bin: version
            updata_bin: updata
            remove_bin: remove
            tg_script: MacOS/tg.sh
            tg_output: tg.sh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --bins

      - name: Prepare dist directory
        shell: bash
        run: |
          set -euo pipefail

          rm -rf dist
          mkdir -p dist

          cp "target/release/${{ matrix.main_bin }}" "dist/${{ matrix.main_bin }}"
          cp "target/release/${{ matrix.version_bin }}" "dist/${{ matrix.version_bin }}"
          cp "target/release/${{ matrix.updata_bin }}" "dist/${{ matrix.updata_bin }}"
          cp "target/release/${{ matrix.remove_bin }}" "dist/${{ matrix.remove_bin }}"

          cp "${{ matrix.tg_script }}" "dist/${{ matrix.tg_output }}"

          if [ -d "assets" ]; then
            cp -R assets dist/
          fi

          if [ -d "scripts" ]; then
            cp -R scripts dist/
          fi

          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x \
              "dist/${{ matrix.main_bin }}" \
              "dist/${{ matrix.version_bin }}" \
              "dist/${{ matrix.updata_bin }}" \
              "dist/${{ matrix.remove_bin }}" \
              "dist/${{ matrix.tg_output }}" || true

            if [ -d "dist/scripts/bash" ]; then
              chmod +x dist/scripts/bash/*.sh || true
            fi
          fi

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail

          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "../${{ matrix.asset_name }}" *
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            zip -r "../${{ matrix.asset_name }}" *
          else
            tar -czf "../${{ matrix.asset_name }}" *
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
